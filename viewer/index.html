<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>都市計画決定GISビューワ</title>
  <meta name="description" content="国土交通省「都市計画決定GISデータ」全国版を PMTiles でベクター表示するビューワー" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#2a78d6" />
  <link rel="icon" type="image/png" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="都市計画GIS" />
</head>
<body>
  <div id="map"></div>

  <section id="panel" class="panel" aria-label="コントロールパネル">
    <header class="panel-head">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">🗺️</span>
        <h1>都市計画決定GISビューワ</h1>
      </div>
      <div class="head-actions">
        <button id="theme-btn" class="icon-btn" type="button" title="テーマ切替" aria-label="テーマ切替"></button>
        <button id="collapse-btn" class="icon-btn" type="button" title="パネル開閉" aria-label="パネル開閉"></button>
      </div>
    </header>

    <div id="panel-body" class="panel-body">
      <div class="field">
        <div class="field-head">
          <span class="field-label">レイヤー</span>
          <div class="field-actions">
            <button id="all-on" class="mini-btn" type="button">全ON</button>
            <button id="all-off" class="mini-btn" type="button">全OFF</button>
          </div>
        </div>
        <div id="layers" class="toggles"></div>
      </div>
    </div>

    <footer class="panel-foot">
      出典: 国土交通省 都市局<a href="https://www.mlit.go.jp/toshi/tosiko/toshi_tosiko_tk_000182.html" target="_blank" rel="noopener">「都市計画決定GISデータ」</a>（参考情報）<br />
      配色: <a href="https://toshikeikaku-info.jp/" target="_blank" rel="noopener">全国都市計画GISビューア</a> を参考<br />
      背景: 国土地理院 最適化ベクトルタイル<br />
      <span id="build-ver" class="build-ver"></span>
    </footer>
  </section>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
